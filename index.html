<!DOCTYPE html>
<html>
<head>
<title>If_Else_If Demo</title>
<link rel="stylesheet" href="styles.css">
<script src="if_else_if.js" defer></script>
<style>
</style>
</head>
<body>
<h1>Score Grading App</h1>
<style>
body{
color:red;
background-color:#A2B45A;
}
h1{
font-size:30px;
color:red;
}
</style>
<form>
<table>
<tr>
<td><label>Mark</label></td><td><input type="text" id="txtMark" value="" placeholder = "enter marks here"/></td>
</tr>
<tr>
<td><label>Grade</label></td><td><input type="text" id="txtGrade" value="" disabled /></td>
</tr>
<tr>
<td colspan="2" style="text-align: center;"><input type="button" id="btnGrade" value="Grade" 
onclick="gradeScore()" /> &nbsp; &nbsp; &nbsp; &nbsp;  &nbsp; &nbsp;
<input type="reset" id="butReset" value="Reset" /></td>
</tr>
</table>
</form>
<script>
function gradeScore(){
let grade, mark;
mark = parseInt(document.getElementById("txtMark").value);
if (mark >=70) {
grade = "A" ;
} else if (mark >=60) {
grade = "B" ;
} else if (mark >=50) {
grade = "C" ;
} else if (mark >=40) {
grade = "D" ;
} else {
grade = "E" ;
}
document.getElementById("txtGrade").value = grade;
}
</script>
</body>
</html>
